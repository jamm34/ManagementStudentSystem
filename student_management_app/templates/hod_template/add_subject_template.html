{% extends 'hod_template/base_template.html' %}
{% block page_title %}Agregar Asignatura{% endblock page_title %}
{% block main_content %}
<section class="content">
  <div class="container-fluid">
    <div class="row justify-content-center">
      <div class="col-12 col-xl-8">
        <div class="ui-surface-card p-3 p-md-4 p-xl-5">
          <div class="ui-panel-header mb-3">
            <h3 class="ui-panel-title">Nueva asignatura</h3>
          </div>

          <form action="{% url 'add_subject_save' %}" method="post" class="ui-form-layout">
            {% csrf_token %}
            <div class="ui-panel mb-4">
              <div class="ui-form-grid">
                <div class="ui-field ui-field-span-2">
                  <label>Nombre de la asignatura</label>
                  <input type="text" class="form-control" name="subject_name" placeholder="Ingrese asignatura" required>
                </div>
                <div class="ui-field">
                  <label>Curso</label>
                  <select class="form-control" name="course" required>
                    {% for course in courses %}
                      <option value="{{ course.id }}">{{ course.course_name }}</option>
                    {% endfor %}
                  </select>
                </div>
                <div class="ui-field">
                  <label>Personal docente</label>
                  <select class="form-control" name="staff" required>
                    {% for staff in staffs %}
                      <option value="{{ staff.id }}">{{ staff.first_name }} {{ staff.last_name }}</option>
                    {% endfor %}
                  </select>
                </div>
              </div>
            </div>

            {% if messages %}
              {% for message in messages %}
                <div class="alert {% if message.tags == 'success' %}alert-success{% else %}alert-danger{% endif %}">{{ message }}</div>
              {% endfor %}
            {% endif %}

            <div class="mt-4 d-flex justify-content-end gap-2">
              <a href="{% url 'manage_subject' %}" class="btn btn-light">Cancelar</a>
              <button type="submit" class="btn btn-primary">Guardar asignatura</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock main_content %}
