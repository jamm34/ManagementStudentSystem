{% extends 'hod_template/base_template.html' %}
{% block page_title %}Inicio{% endblock page_title %}
{% block main_content %}
<section class="content">
  <div class="container-fluid">
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
      <article class="ui-stat-card p-4">
        <div class="flex items-start justify-between">
          <div>
            <p class="text-sm text-slate-500 mb-1">Personal registrado</p>
            <h3 class="text-3xl font-bold text-slate-900">{{ staff_count }}</h3>
          </div>
          <span class="ui-stat-icon bg-cyan-100 text-cyan-700"><i class="fas fa-users"></i></span>
        </div>
        <div class="mt-4 pt-3 border-top border-slate-200">
          <a href="{% url 'manage_staff' %}" class="ui-btn-link">Ver gestión de personal <i class="fas fa-arrow-right ml-1"></i></a>
        </div>
      </article>
    </div>
  </div>
</section>
{% endblock main_content %}
