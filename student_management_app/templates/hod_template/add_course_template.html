{% extends 'hod_template/base_template.html' %}
{% block page_title %}Agregar Curso{% endblock page_title %}
{% block main_content %}
<section class="content">
  <div class="container-fluid">
    <div class="row justify-content-center">
      <div class="col-12 col-xl-7">
        <div class="ui-surface-card p-3 p-md-4 p-xl-5">
          <div class="ui-panel-header mb-3">
            <h3 class="ui-panel-title">Nuevo curso</h3>
          </div>
          <form action="{% url 'add_course_save' %}" method="post" class="ui-form-layout">
            {% csrf_token %}
            <div class="ui-panel mb-4">
              <div class="ui-form-grid">
                <div class="ui-field ui-field-span-2">
                  <label>Nombre del curso</label>
                  <input type="text" class="form-control" name="course" placeholder="Ingrese curso" required>
                </div>
              </div>
            </div>

            {% if messages %}
              {% for message in messages %}
                <div class="alert {% if message.tags == 'success' %}alert-success{% else %}alert-danger{% endif %}">{{ message }}</div>
              {% endfor %}
            {% endif %}

            <div class="mt-4 d-flex justify-content-end gap-2">
              <a href="{% url 'manage_course' %}" class="btn btn-light">Cancelar</a>
              <button type="submit" class="btn btn-primary">Guardar curso</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock main_content %}
