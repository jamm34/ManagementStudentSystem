{% extends 'student_template/base_template.html' %}
{% block page_title %}Inicio{% endblock page_title %}
{% block main_content %}
<section class="content">
  <div class="container-fluid">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <article class="ui-stat-card p-4">
        <div class="flex items-start justify-between">
          <div>
            <p class="text-sm text-slate-500 mb-1">Permisos pendientes</p>
            <h3 class="text-3xl font-bold text-slate-900">{{ pending_leaves }}</h3>
          </div>
          <span class="ui-stat-icon bg-amber-100 text-amber-700"><i class="fas fa-calendar-times"></i></span>
        </div>
        <div class="mt-4 pt-3 border-top border-slate-200">
          <a href="{% url 'student_apply_leave' %}" class="ui-btn-link">Ver detalle <i class="fas fa-arrow-right ml-1"></i></a>
        </div>
      </article>

      <article class="ui-stat-card p-4">
        <div class="flex items-start justify-between">
          <div>
            <p class="text-sm text-slate-500 mb-1">Feedback sin respuesta</p>
            <h3 class="text-3xl font-bold text-slate-900">{{ pending_feedback }}</h3>
          </div>
          <span class="ui-stat-icon bg-rose-100 text-rose-700"><i class="fas fa-comment-dots"></i></span>
        </div>
        <div class="mt-4 pt-3 border-top border-slate-200">
          <a href="{% url 'student_feedback' %}" class="ui-btn-link">Ver detalle <i class="fas fa-arrow-right ml-1"></i></a>
        </div>
      </article>
    </div>
  </div>
</section>
{% endblock main_content %}
