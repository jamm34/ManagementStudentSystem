{% if messages %}
<div aria-live="polite" aria-atomic="true" class="ui-toast-zone">
  {% for message in messages %}
  <div class="toast ui-toast {% if message.tags == 'success' %}ui-toast-success{% elif message.tags == 'error' %}ui-toast-error{% else %}ui-toast-info{% endif %}" role="alert" aria-live="assertive" aria-atomic="true" data-delay="4200">
    <div class="toast-header">
      <strong class="mr-auto">Notificacion</strong>
      <small>ahora</small>
      <button type="button" class="ml-2 mb-1 close" data-dismiss="toast" aria-label="Close">
        <span aria-hidden="true">&times;</span>
      </button>
    </div>
    <div class="toast-body">{{ message }}</div>
  </div>
  {% endfor %}
</div>
{% endif %}
